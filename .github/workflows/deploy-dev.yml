name: Deploy to Firebase Dev

on:
  push:
    branches:
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Deploy functions
        run: npx firebase-tools deploy --only functions --project sky-suite-d14ff --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive --force

      - name: Deploy hosting to dev preview channel
        run: npx firebase-tools hosting:channel:deploy dev --project sky-suite-d14ff --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive --expires 30d
