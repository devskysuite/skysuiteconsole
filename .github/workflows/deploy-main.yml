name: Deploy to Firebase Production

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '24'

      - name: Install dashboard dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Deploy functions
        run: npx firebase-tools deploy --only functions --project sky-suite-d14ff --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive --force

      - name: Deploy hosting to production
        run: npx firebase-tools deploy --only hosting --project sky-suite-d14ff --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive

      - name: Deploy storage rules to production
        run: npx firebase-tools deploy --only storage --project sky-suite-d14ff --token "${{ secrets.FIREBASE_TOKEN }}" --non-interactive
        continue-on-error: true
